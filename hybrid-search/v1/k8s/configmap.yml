apiVersion: v1
kind: ConfigMap
metadata:
  name: search-api-config
data:
  ES_HOST: "elasticsearch"
  ES_PORT: "9200"
  ES_MAX_CONNS: "50"
  ES_TIMEOUT: "30"
  ES_SEARCH_TIMEOUT: "5"
  REDIS_URL: "redis://redis:6379"
  REDIS_MAX_CONNS: "10"
  MODEL_NAME: "all-MiniLM-L6-v2"
  CACHE_SIZE: "10000"
  CACHE_TTL: "300"
  MAX_CONCURRENT: "50"
  BATCH_SIZE: "32"
  EMBEDDING_CACHE_SIZE: "2000"
  WORKERS: "4"
  DEBUG: "false"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_PERIOD: "60"
  CIRCUIT_ERROR_RATE_THRESHOLD: "0.1"
  CIRCUIT_MINIMUM_REQUESTS: "10"
  CIRCUIT_RECOVERY_TIMEOUT: "30"
  CIRCUIT_SLIDING_WINDOW: "60"
  RETRY_MAX_ATTEMPTS: "3"
  RETRY_BASE_DELAY: "1.0"
  RETRY_MAX_DELAY: "10.0"
  OTEL_ENABLED: "false"
  OTEL_SERVICE_NAME: "magazine-search"
  OTEL_ENVIRONMENT: "production"
  WARM_QUERIES: "technology,science,business,health,design,programming,ai,cloud"
  WARM_CACHE_SIZE: "100"