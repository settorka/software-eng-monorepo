apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-api
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: settlement-api
  template:
    metadata:
      labels:
        app: settlement-api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image | quote }}
          imagePullPolicy: {{ .Values.api.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef:
                name: settlement-config
            - secretRef:
                name: settlement-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.api.port }}
          livenessProbe:
            httpGet:
              path: /live
              port: {{ .Values.api.port }}

---
apiVersion: v1
kind: Service
metadata:
  name: settlement-api
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: settlement-api
  ports:
    - name: http
      port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
