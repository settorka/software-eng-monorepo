apiVersion: v1
kind: ConfigMap
metadata:
  name: settlement-config
  namespace: {{ .Values.namespace }}
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  DOTNET_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:{{ .Values.api.port }}"
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otelEndpoint | quote }}
  OperationalControls__IntakeEnabled: {{ .Values.operationalControls.intakeEnabled | quote }}
  OperationalControls__WorkflowPumpEnabled: {{ .Values.operationalControls.workflowPumpEnabled | quote }}
  OperationalControls__MaxPumpWorkflows: {{ .Values.operationalControls.maxPumpWorkflows | quote }}
  OperationalControls__PollIntervalMilliseconds: {{ .Values.operationalControls.pollIntervalMilliseconds | quote }}
  OperationalControls__MaxRequestBodyBytes: {{ .Values.operationalControls.maxRequestBodyBytes | quote }}
  OperationalControls__DetailedErrors: {{ .Values.operationalControls.detailedErrors | quote }}
  Logging__LogLevel__Default: {{ .Values.logging.defaultLevel | quote }}
  Logging__LogLevel__Microsoft.AspNetCore: {{ .Values.logging.aspNetCoreLevel | quote }}
