apiVersion: v1
kind: ConfigMap
metadata:
  name: settlement-config
  namespace: {{ .Values.namespace }}
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  DOTNET_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:{{ .Values.api.port }}"
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.observability.otelEndpoint | quote }}
  OperationalControls__IntakeEnabled: {{ .Values.operationalControls.intakeEnabled | quote }}
  OperationalControls__WorkflowPumpEnabled: {{ .Values.operationalControls.workflowPumpEnabled | quote }}
  OperationalControls__OutboxDispatcherEnabled: {{ .Values.operationalControls.outboxDispatcherEnabled | quote }}
  OperationalControls__MaxPumpWorkflows: {{ .Values.operationalControls.maxPumpWorkflows | quote }}
  OperationalControls__OutboxBatchSize: {{ .Values.operationalControls.outboxBatchSize | quote }}
  OperationalControls__OutboxMaxAttempts: {{ .Values.operationalControls.outboxMaxAttempts | quote }}
  OperationalControls__PollIntervalMilliseconds: {{ .Values.operationalControls.pollIntervalMilliseconds | quote }}
  OperationalControls__MaxRequestBodyBytes: {{ .Values.operationalControls.maxRequestBodyBytes | quote }}
  OperationalControls__DetailedErrors: {{ .Values.operationalControls.detailedErrors | quote }}
  Database__RunMigrationsOnStartup: {{ .Values.database.runMigrationsOnStartup | quote }}
  Auth__Enabled: {{ .Values.auth.enabled | quote }}
  Auth__Authority: {{ .Values.auth.authority | quote }}
  Auth__Audience: {{ .Values.auth.audience | quote }}
  Auth__RequireHttpsMetadata: {{ .Values.auth.requireHttpsMetadata | quote }}
  OutboxPublisher__Mode: {{ .Values.outboxPublisher.mode | quote }}
  OutboxPublisher__Endpoint: {{ .Values.outboxPublisher.endpoint | quote }}
  OutboxPublisher__ApiKey: {{ .Values.outboxPublisher.apiKey | quote }}
  OutboxPublisher__TimeoutMilliseconds: {{ .Values.outboxPublisher.timeoutMilliseconds | quote }}
  OutboxPublisher__MaxPayloadBytes: {{ .Values.outboxPublisher.maxPayloadBytes | quote }}
  Logging__LogLevel__Default: {{ .Values.logging.defaultLevel | quote }}
  Logging__LogLevel__Microsoft.AspNetCore: {{ .Values.logging.aspNetCoreLevel | quote }}
  Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: {{ .Values.logging.efCommandLevel | quote }}
  Serilog__MinimumLevel__Override__Microsoft.EntityFrameworkCore.Database.Command: {{ .Values.logging.efCommandLevel | quote }}
