apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-worker
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: settlement-worker
  template:
    metadata:
      labels:
        app: settlement-worker
    spec:
      initContainers:
        - name: wait-for-settlement-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://settlement-api:{{ .Values.api.port }}/ready; do
                echo "waiting for settlement-api readiness"
                sleep 2
              done
      containers:
        - name: worker
          image: {{ .Values.worker.image | quote }}
          imagePullPolicy: {{ .Values.worker.pullPolicy }}
          envFrom:
            - configMapRef:
                name: settlement-config
            - secretRef:
                name: settlement-secrets
          env:
            - name: Database__RunMigrationsOnStartup
              value: "false"
