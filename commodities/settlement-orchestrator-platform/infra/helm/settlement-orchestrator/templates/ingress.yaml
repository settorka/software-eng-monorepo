{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: settlement-api
  namespace: {{ .Values.namespace }}
spec:
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: settlement-api
                port:
                  number: {{ .Values.api.port }}
{{- end }}

