services:
  api:
    build:
      context: ../..
      dockerfile: src/Settlement.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS}
      ConnectionStrings__Oracle: ${ConnectionStrings__Oracle}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OperationalControls__IntakeEnabled: ${OperationalControls__IntakeEnabled}
      OperationalControls__WorkflowPumpEnabled: ${OperationalControls__WorkflowPumpEnabled}
      OperationalControls__OutboxDispatcherEnabled: ${OperationalControls__OutboxDispatcherEnabled}
      OperationalControls__MaxPumpWorkflows: ${OperationalControls__MaxPumpWorkflows}
      OperationalControls__OutboxBatchSize: ${OperationalControls__OutboxBatchSize}
      OperationalControls__OutboxMaxAttempts: ${OperationalControls__OutboxMaxAttempts}
      OperationalControls__PollIntervalMilliseconds: ${OperationalControls__PollIntervalMilliseconds}
      OperationalControls__MaxRequestBodyBytes: ${OperationalControls__MaxRequestBodyBytes}
      OperationalControls__DetailedErrors: ${OperationalControls__DetailedErrors}
      Database__RunMigrationsOnStartup: ${Database__RunMigrationsOnStartup}
      Auth__Enabled: ${Auth__Enabled}
      Auth__Authority: ${Auth__Authority}
      Auth__Audience: ${Auth__Audience}
      Auth__RequireHttpsMetadata: ${Auth__RequireHttpsMetadata}
      Auth__SigningKey: ${Auth__SigningKey}
      OutboxPublisher__Mode: ${OutboxPublisher__Mode}
      OutboxPublisher__Endpoint: ${OutboxPublisher__Endpoint}
      OutboxPublisher__ApiKey: ${OutboxPublisher__ApiKey}
      OutboxPublisher__TimeoutMilliseconds: ${OutboxPublisher__TimeoutMilliseconds}
      OutboxPublisher__MaxPayloadBytes: ${OutboxPublisher__MaxPayloadBytes}
      RabbitMq__Host: ${RabbitMq__Host}
      RabbitMq__Port: ${RabbitMq__Port}
      RabbitMq__Username: ${RabbitMq__Username}
      RabbitMq__Password: ${RabbitMq__Password}
      RabbitMq__Exchange: ${RabbitMq__Exchange}
      RabbitMq__RoutingKey: ${RabbitMq__RoutingKey}
      RabbitMq__TimeoutMilliseconds: ${RabbitMq__TimeoutMilliseconds}
      Logging__LogLevel__Default: ${LOG_LEVEL_DEFAULT}
      Logging__LogLevel__Microsoft.AspNetCore: ${LOG_LEVEL_MICROSOFT_ASPNETCORE}
      Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: ${LOG_LEVEL_EF_COMMAND}
      Serilog__MinimumLevel__Override__Microsoft.EntityFrameworkCore.Database.Command: ${LOG_LEVEL_EF_COMMAND}
    ports:
      - "${API_HTTP_PORT}:8080"
    depends_on:
      oracle:
        condition: service_healthy
      otel-collector:
        condition: service_started

  worker:
    build:
      context: ../..
      dockerfile: src/Settlement.Worker/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT}
      ConnectionStrings__Oracle: ${ConnectionStrings__Oracle}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OperationalControls__WorkflowPumpEnabled: ${OperationalControls__WorkflowPumpEnabled}
      OperationalControls__OutboxDispatcherEnabled: ${OperationalControls__OutboxDispatcherEnabled}
      OperationalControls__MaxPumpWorkflows: ${OperationalControls__MaxPumpWorkflows}
      OperationalControls__OutboxBatchSize: ${OperationalControls__OutboxBatchSize}
      OperationalControls__OutboxMaxAttempts: ${OperationalControls__OutboxMaxAttempts}
      OperationalControls__PollIntervalMilliseconds: ${OperationalControls__PollIntervalMilliseconds}
      OutboxPublisher__Mode: ${OutboxPublisher__Mode}
      OutboxPublisher__Endpoint: ${OutboxPublisher__Endpoint}
      OutboxPublisher__ApiKey: ${OutboxPublisher__ApiKey}
      OutboxPublisher__TimeoutMilliseconds: ${OutboxPublisher__TimeoutMilliseconds}
      OutboxPublisher__MaxPayloadBytes: ${OutboxPublisher__MaxPayloadBytes}
      RabbitMq__Host: ${RabbitMq__Host}
      RabbitMq__Port: ${RabbitMq__Port}
      RabbitMq__Username: ${RabbitMq__Username}
      RabbitMq__Password: ${RabbitMq__Password}
      RabbitMq__Exchange: ${RabbitMq__Exchange}
      RabbitMq__RoutingKey: ${RabbitMq__RoutingKey}
      RabbitMq__TimeoutMilliseconds: ${RabbitMq__TimeoutMilliseconds}
      Database__RunMigrationsOnStartup: "false"
      Logging__LogLevel__Default: ${LOG_LEVEL_DEFAULT}
      Logging__LogLevel__Microsoft.EntityFrameworkCore.Database.Command: ${LOG_LEVEL_EF_COMMAND}
      Serilog__MinimumLevel__Override__Microsoft.EntityFrameworkCore.Database.Command: ${LOG_LEVEL_EF_COMMAND}
    depends_on:
      oracle:
        condition: service_healthy
      otel-collector:
        condition: service_started

  oracle:
    image: gvenzl/oracle-free:23-slim
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      APP_USER: ${ORACLE_APP_USER}
      APP_USER_PASSWORD: ${ORACLE_APP_PASSWORD}
    ports:
      - "${ORACLE_PORT}:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_AMQP_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT}:4317"
      - "${OTEL_HTTP_PORT}:4318"
      - "${OTEL_PROMETHEUS_PORT}:8889"
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.53.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
      - loki
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT}:16686"
      - "14250:14250"
      - "4317"

  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT}:3100"

volumes:
  oracle-data:
  rabbitmq-data:
  prometheus-data:
  grafana-data:
  loki-data:
