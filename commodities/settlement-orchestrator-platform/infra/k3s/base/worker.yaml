apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-worker
  namespace: settlement
spec:
  replicas: 1
  selector:
    matchLabels:
      app: settlement-worker
  template:
    metadata:
      labels:
        app: settlement-worker
    spec:
      initContainers:
        - name: wait-for-settlement-api
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -qO- http://settlement-api:8080/ready; do
                echo "waiting for settlement-api readiness"
                sleep 2
              done
      containers:
        - name: worker
          image: settlement-worker:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: settlement-config
            - secretRef:
                name: settlement-secrets
          env:
            - name: Database__RunMigrationsOnStartup
              value: "false"
