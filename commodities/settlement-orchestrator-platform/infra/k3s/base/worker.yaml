apiVersion: apps/v1
kind: Deployment
metadata:
  name: settlement-worker
  namespace: settlement
spec:
  replicas: 1
  selector:
    matchLabels:
      app: settlement-worker
  template:
    metadata:
      labels:
        app: settlement-worker
    spec:
      containers:
        - name: worker
          image: settlement-worker:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: settlement-config
            - secretRef:
                name: settlement-secrets
